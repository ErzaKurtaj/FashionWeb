<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passionis — Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <script src="assets/js/forgot-password.js" defer></script>
    <style>
      /* ─── Tokens ─────────────────────────────────────────────── */
      :root {
        --f-serif: "Cormorant Garamond", Georgia, serif;
        --f-sans: "Jost", system-ui, sans-serif;

        --c-bg: #0b0a08;
        --c-panel: #0e0d0b;
        --c-gold: #c9a870;
        --c-gold-d: rgba(201, 168, 112, 0.42);
        --c-cream: #f0ede6;
        --c-muted: rgba(240, 237, 230, 0.36);
        --c-line: rgba(240, 237, 230, 0.07);

        --ease: cubic-bezier(0.4, 0, 0.2, 1);
        --ease-o: cubic-bezier(0, 0, 0.2, 1);
        --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family: var(--f-sans);
        background: var(--c-bg);
        color: var(--c-cream);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .auth-panel {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 80px 64px;
        background: var(--c-panel);
        position: relative;
        overflow: hidden;
      }

      .auth-panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 15% 85%,
            rgba(201, 168, 112, 0.07) 0%,
            transparent 52%
          ),
          radial-gradient(
            ellipse at 85% 8%,
            rgba(201, 168, 112, 0.04) 0%,
            transparent 45%
          );
        pointer-events: none;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        position: relative;
        z-index: 1;
      }

      .auth-heading {
        font-family: var(--f-serif);
        font-size: 40px;
        font-weight: 300;
        color: var(--c-cream);
        margin-bottom: 14px;
      }

      .auth-copy {
        font-size: 12px;
        font-weight: 300;
        line-height: 1.8;
        letter-spacing: 0.02em;
        color: var(--c-muted);
        margin-bottom: 44px;
      }

      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 34px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 11px;
      }

      .form-group label {
        font-size: 8px;
        font-weight: 500;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(240, 237, 230, 0.3);
        transition: color 0.3s var(--ease);
      }

      .form-group:focus-within label {
        color: var(--c-gold);
      }

      .form-group input {
        background-color: transparent;
        background-image:
          linear-gradient(rgba(240, 237, 230, 0.1), rgba(240, 237, 230, 0.1)),
          linear-gradient(var(--c-gold), var(--c-gold));
        background-size:
          100% 1px,
          0% 1px;
        background-position:
          0 100%,
          0 100%;
        background-repeat: no-repeat;
        border: none;
        color: var(--c-cream);
        font-family: var(--f-sans);
        font-size: 15px;
        font-weight: 300;
        letter-spacing: 0.02em;
        padding: 10px 0;
        outline: none;
        width: 100%;
        transition: background-size 0.5s var(--ease);
      }

      .form-group input:focus {
        background-size:
          100% 1px,
          100% 1px;
      }

      .field-error {
        display: none;
        font-size: 9px;
        letter-spacing: 0.08em;
        color: #b05a3e;
      }

      .global-error {
        display: none;
        font-size: 10px;
        letter-spacing: 0.05em;
        color: #b05a3e;
        text-align: center;
        padding: 2px 0;
      }

      .global-info {
        display: none;
        font-size: 10px;
        letter-spacing: 0.05em;
        color: var(--c-gold);
        text-align: center;
        padding: 2px 0;
      }

      .btn-auth {
        width: 100%;
        background: transparent;
        color: var(--c-gold);
        border: 1px solid var(--c-gold-d);
        font-family: var(--f-sans);
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        padding: 19px;
        cursor: pointer;
        margin-top: 6px;
        position: relative;
        overflow: hidden;
        z-index: 0;
        transition:
          color 0.42s var(--ease),
          border-color 0.42s var(--ease),
          transform 0.22s var(--spring),
          box-shadow 0.3s var(--ease);
      }

      .btn-auth::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--c-gold);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.48s var(--ease);
        z-index: -1;
      }

      .btn-auth:hover:not(:disabled) {
        color: var(--c-bg);
        border-color: var(--c-gold);
        transform: translateY(-2px);
        box-shadow: 0 10px 36px rgba(201, 168, 112, 0.2);
      }

      .btn-auth:hover:not(:disabled)::before {
        transform: scaleX(1);
      }

      .btn-auth:disabled {
        opacity: 0.28;
        cursor: not-allowed;
      }

      .back-link {
        display: inline-block;
        margin-top: 32px;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(240, 237, 230, 0.36);
        text-decoration: none;
        transition: color 0.25s var(--ease);
      }

      .back-link:hover {
        color: var(--c-gold);
      }
    </style>
  </head>
  <body>
    <div class="auth-panel">
      <div class="auth-card">
        <h1 class="auth-heading">Forgot your password?</h1>
        <p class="auth-copy">
          Enter the email address on your account and we'll send you a link
          to reset your password.
        </p>

        <form id="forgot-form" class="auth-form" novalidate>
          <span class="global-info" id="forgot-global-info"></span>
          <div class="form-group">
            <label for="forgot-email">Email Address</label>
            <input type="email" id="forgot-email" name="email" autocomplete="email" />
            <span class="field-error" id="forgot-email-error"></span>
          </div>
          <span class="global-error" id="forgot-global-error"></span>
          <button type="submit" class="btn-auth">Send Reset Link</button>
        </form>

        <a href="/login.html" class="back-link">&larr; Back to Log In</a>
      </div>
    </div>
  </body>
</html>
